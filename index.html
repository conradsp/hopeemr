<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon-192x192.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#228be6" />
    <meta name="description" content="Electronic Medical Records for Low-Resource Healthcare Settings" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="HopeEMR" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Content Security Policy is applied as an HTTP header in production
         (see nginx-secure.conf). It is not declared here because:
           - `frame-ancestors` is silently ignored by browsers when delivered via <meta>
             (it only works in the HTTP header).
           - A meta-tag CSP cannot differ between dev and production builds, but Vite's
             dev server injects an inline HMR script that requires `'unsafe-inline'`. -->

    <title>HopeEMR</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
