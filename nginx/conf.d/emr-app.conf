# EMR Application (hopeemr.com)
# Production configuration - static files served by nginx

server {
    listen 80;
    server_name hopeemr.com www.hopeemr.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name hopeemr.com www.hopeemr.com;

    # SSL certificates
    ssl_certificate /etc/letsencrypt/live/hopeemr.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hopeemr.com/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content Security Policy — single source of truth for production.
    # `style-src 'unsafe-inline'` is required by Mantine UI; scripts stay strict.
    # `frame-ancestors 'none'` only takes effect via HTTP header, not <meta>.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; font-src 'self' data:; connect-src 'self' https://api.hopeemr.com wss://api.hopeemr.com https://api.medplum.com https://*.medplum.com wss://*.medplum.com https://clinicaltables.nlm.nih.gov; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # Proxy to emr-app container
    location / {
        proxy_pass http://emr-app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Standard timeouts
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # Health check endpoint (no logging)
    location /health {
        access_log off;
        proxy_pass http://emr-app:3000/health;
    }
}
